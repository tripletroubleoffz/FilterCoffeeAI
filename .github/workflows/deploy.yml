name: Deploy FilterCoffee.ai

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint Codebase
        run: npm run lint

      - name: Prisma Schema Validation
        run: npx prisma validate

      - name: Run Build Test
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_bW9jay1jbGVyay1rZXktNDIuY2xlcmsuYWNjb3VudHMuZGV2JA"
          CLERK_SECRET_KEY: "sk_test_mockclerksecretkey"
          DATABASE_URL: "file:./dev.db"

  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

